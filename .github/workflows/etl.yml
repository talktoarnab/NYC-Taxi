# Run the NYC Taxi ETL on a schedule and on demand. Artifacts (output/) can be
# downloaded from the workflow run to verify the pipeline, or you can extend this
# with a step to sync to S3 for Streamlit to consume (requires app changes).
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   PARQUET_URL — any TLC URL containing yellow_tripdata_YYYY-MM.parquet (month is rewritten
#     at runtime for a rolling window). If unset, ETL uses the single default month in code.
#   PARQUET_HISTORY_MONTHS — integer; rolling window length in months (default 60 if unset).
#   PARQUET_WINDOW_END — optional: omit or 'template' = window ends at the month in PARQUET_URL;
#     'today' = end at runner's current month (include months after the URL's Y-M).
name: ETL — NYC Taxi

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

# Queue overlapping runs instead of cancelling an in-flight ETL (long downloads + transforms).
concurrency:
  group: etl-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL
        env:
          PARQUET_URL: ${{ vars.PARQUET_URL }}
          # Repo variable drives window size; when not defined, match Python default (60).
          PARQUET_HISTORY_MONTHS: ${{ vars.PARQUET_HISTORY_MONTHS || '60' }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m nyc_taxi -q

      # upload-artifact strips the uploaded directory's name from paths, so `path: output/`
      # would yield a zip with `gold/` + `kpi/` at the root (no `output/`). Stage under a
      # parent folder so the artifact matches local `output/` layout and docs.
      - name: Stage artifact tree
        run: |
          mkdir -p _artifact_staging
          cp -a output _artifact_staging/output

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: etl-output
          path: _artifact_staging
          retention-days: 30
          if-no-files-found: error
