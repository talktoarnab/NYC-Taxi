# Run the NYC Taxi ETL on a schedule and on demand. Artifacts (output/) can be
# downloaded from the workflow run to verify the pipeline, or you can extend this
# with a step to sync to S3 for Streamlit to consume (requires app changes).
name: ETL — NYC Taxi

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Set NYC_TAXI_PARQUET_URL under Settings → Actions → Variables, or the same
      # name under Secrets (e.g. full URL: …/yellow_tripdata_2025-10.parquet).
      # Do not override with a shell "export" here — that was ignoring Variables.
      - name: Run ETL
        env:
          # Secret, if set, wins; otherwise Repository / Environment variable
          NYC_TAXI_PARQUET_URL: ${{ secrets.NYC_TAXI_PARQUET_URL || vars.NYC_TAXI_PARQUET_URL }}
        run: |
          if [ -z "$NYC_TAXI_PARQUET_URL" ]; then
            echo '::warning::NYC_TAXI_PARQUET_URL is not set. Add it under GitHub → Settings → Actions → Variables or Repository secrets, or the ETL uses the 2024-01 default from config.py.'
          fi
          python -m nyc_taxi -q

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: etl-output
          path: output/
          retention-days: 30
          if-no-files-found: error
