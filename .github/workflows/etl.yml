# Run the NYC Taxi ETL on a schedule and on demand. Artifacts (output/) can be
# downloaded from the workflow run to verify the pipeline, or you can extend this
# with a step to sync to S3 for Streamlit to consume (requires app changes).
name: ETL — NYC Taxi

on:
  workflow_dispatch:
  schedule:
    # Weekly: Sunday 06:00 UTC (adjust or disable if not needed)
    - cron: "0 6 * * 0"

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL
        run: |
          python -m nyc_taxi -q

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: etl-output
          path: output/
          retention-days: 30
          if-no-files-found: error
